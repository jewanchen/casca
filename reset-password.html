<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重設密碼 — Casca</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg:     #080c14;
    --bg2:    #0d1421;
    --bg3:    #111827;
    --teal:   #00d4aa;
    --teal2:  #00b894;
    --red:    #ff5f6d;
    --t1:     #f0f4fa;
    --t2:     #b8ccde;
    --t3:     #8aaec6;
    --t4:     #4a6070;
    --b1:     rgba(255,255,255,0.06);
    --b2:     rgba(255,255,255,0.11);
    --mono:   'JetBrains Mono', 'Fira Mono', monospace;
    --display:'Syne', sans-serif;
    --font:   'Plus Jakarta Sans', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--t1);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 0.5px solid var(--b2);
    border-radius: 16px;
    padding: 36px 32px 32px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(0,212,170,0.08) inset;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-mark {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #e8f4fd 0%, var(--teal) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    color: var(--t1);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--t3);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 10px;
    font-family: var(--display);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--t3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    background: var(--bg3);
    border: 0.5px solid var(--b2);
    border-radius: 8px;
    color: var(--t1);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.04em;
  }
  .input-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
  }
  .input-wrap input.error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,95,109,0.12);
  }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--t4);
    padding: 2px;
    line-height: 0;
    transition: color 0.15s;
  }
  .toggle-pw:hover { color: var(--t2); }

  .strength-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--b1);
    margin-top: 6px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease, background 0.3s ease;
    width: 0%;
  }
  .strength-label {
    font-size: 10px;
    color: var(--t4);
    margin-top: 4px;
    transition: color 0.2s;
  }

  .requirements {
    background: var(--bg3);
    border: 0.5px solid var(--b1);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 8px;
  }
  .req-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--t4);
    transition: color 0.2s;
  }
  .req-item.met { color: var(--teal); }
  .req-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .btn-submit {
    width: 100%;
    padding: 12px;
    background: var(--teal);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover:not(:disabled) { background: var(--teal2); }
  .btn-submit:active:not(:disabled) { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
    line-height: 1.5;
  }
  .msg.error {
    background: rgba(255,95,109,0.08);
    border: 0.5px solid rgba(255,95,109,0.3);
    color: var(--red);
    display: block;
  }
  .msg.success {
    background: rgba(0,212,170,0.07);
    border: 0.5px solid rgba(0,212,170,0.25);
    color: var(--teal);
    display: block;
  }
  .msg.info {
    background: rgba(59,158,255,0.07);
    border: 0.5px solid rgba(59,158,255,0.25);
    color: #7ab8ff;
    display: block;
  }

  /* State screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(8,12,20,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success icon */
  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .success-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    color: var(--teal);
  }
  .success-body {
    font-size: 13px;
    color: var(--t3);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .btn-login {
    display: block;
    width: 100%;
    padding: 11px;
    background: var(--bg3);
    border: 0.5px solid var(--b2);
    border-radius: 8px;
    color: var(--t2);
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-login:hover { background: rgba(255,255,255,0.06); border-color: var(--b2); color: var(--t1); }

  /* Invalid token screen */
  .invalid-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255,95,109,0.1);
    border: 1px solid rgba(255,95,109,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .invalid-title {
    font-family: var(--display);
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    color: var(--red);
  }
  .invalid-body {
    font-size: 13px;
    color: var(--t3);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .footer-note {
    margin-top: 20px;
    font-size: 11px;
    color: var(--t4);
    text-align: center;
    line-height: 1.6;
  }
  .footer-note a {
    color: var(--t3);
    text-decoration: none;
  }
  .footer-note a:hover { color: var(--teal); }

  /* Countdown */
  #countdown-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--t4);
    text-align: center;
    margin-top: 10px;
  }
  #countdown-num { color: var(--teal); font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
      <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" fill="rgba(0,212,170,0.07)" stroke="rgba(0,212,170,0.28)" stroke-width="0.8"/>
      <path d="M16 2L22 9.5L16 17L10 9.5Z" fill="rgba(0,212,170,0.16)"/>
      <path d="M10 9.5L4 23L16 17Z" fill="rgba(59,158,255,0.12)"/>
      <path d="M22 9.5L28 23L16 17Z" fill="rgba(0,212,170,0.09)"/>
      <circle cx="16" cy="17" r="2.8" fill="url(#g1)"/>
      <circle cx="16" cy="2" r="1.6" fill="rgba(0,212,170,0.8)"/>
      <defs><radialGradient id="g1"><stop offset="0%" stop-color="#00d4aa"/><stop offset="100%" stop-color="#3b9eff"/></radialGradient></defs>
    </svg>
    <span class="logo-text">Casca</span>
  </div>

  <!-- Screen: loading (parsing token) -->
  <div class="screen active" id="screen-loading">
    <h1>驗證連結中…</h1>
    <p class="subtitle">正在驗證重設密碼連結，請稍候。</p>
    <div style="text-align:center;padding:20px 0;color:var(--t4);font-size:13px">
      <span class="spinner"></span> 驗證中…
    </div>
  </div>

  <!-- Screen: set new password -->
  <div class="screen" id="screen-reset">
    <h1>設定新密碼</h1>
    <p class="subtitle">請輸入你的新密碼，設定完成後將自動導向登入頁面。</p>

    <div class="msg" id="reset-msg"></div>

    <div class="field">
      <label>新密碼</label>
      <div class="input-wrap">
        <input type="password" id="pw1" placeholder="至少 8 個字元" autocomplete="new-password" oninput="checkStrength()">
        <button class="toggle-pw" type="button" onclick="toggleVis('pw1',this)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
            <circle cx="8" cy="8" r="2.2"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label">請輸入密碼</div>
    </div>

    <div class="requirements" id="reqs">
      <div class="req-item" id="req-len"><span class="req-dot"></span>至少 8 個字元</div>
      <div class="req-item" id="req-upper"><span class="req-dot"></span>含大寫字母</div>
      <div class="req-item" id="req-num"><span class="req-dot"></span>含數字</div>
      <div class="req-item" id="req-special"><span class="req-dot"></span>含特殊符號</div>
    </div>

    <div class="field">
      <label>確認新密碼</label>
      <div class="input-wrap">
        <input type="password" id="pw2" placeholder="再輸入一次" autocomplete="new-password" oninput="checkMatch()">
        <button class="toggle-pw" type="button" onclick="toggleVis('pw2',this)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
            <circle cx="8" cy="8" r="2.2"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-submit" id="btn-reset" onclick="doReset()" disabled>
      更新密碼
    </button>

    <p class="footer-note">設定完成後將自動導向登入頁面</p>
  </div>

  <!-- Screen: success -->
  <div class="screen" id="screen-success">
    <div class="success-icon">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="#00d4aa" stroke-width="2.2" stroke-linecap="round">
        <path d="M5 13l5.5 5.5L21 7"/>
      </svg>
    </div>
    <div class="success-title">密碼已更新</div>
    <div class="success-body">你的新密碼已設定完成。<br>請用新密碼重新登入。</div>
    <a href="javascript:void(0)" class="btn-login" id="btn-go-login">前往登入頁面</a>
    <p id="countdown-text" style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--t4);text-align:center">
      <span id="countdown-num">5</span> 秒後自動跳轉…
    </p>
  </div>

  <!-- Screen: invalid / expired token -->
  <div class="screen" id="screen-invalid">
    <div class="invalid-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff5f6d" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
    <div class="invalid-title">連結無效或已過期</div>
    <div class="invalid-body" id="invalid-reason">
      這個重設密碼連結已過期或已使用過，請重新申請。
    </div>
    <a href="javascript:void(0)" class="btn-login" id="btn-retry">重新申請重設密碼</a>
    <p class="footer-note" style="margin-top:16px">
      或聯繫管理員：<a href="/cdn-cgi/l/email-protection#680b091b0b09281e091b1c011c1f460b0705"><span class="__cf_email__" data-cfemail="6a090b19090b2a1c0b191e031e1d44090507">[email&#160;protected]</span></a>
    </p>
  </div>

</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ─── Config ──────────────────────────────────────────────────
// Replace with your Supabase project values
const SUPABASE_URL     = 'https://chixjizrlvfkonzswttv.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // ← replace with your anon key

// Where to send the user after successful reset / on retry
// This should be your Admin Portal or login page URL
const LOGIN_URL = 'https://cascaio.com/admin'; // ← update to your admin portal URL

// ─── Init Supabase ────────────────────────────────────────────
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── Parse #hash from URL ─────────────────────────────────────
function parseHash() {
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  return {
    accessToken:  params.get('access_token'),   // JWT (from Supabase-generated links)
    refreshToken: params.get('refresh_token'),
    token:        params.get('token'),           // OTP token (from email template {{ .Token }})
    type:         params.get('type'),            // 'recovery' | 'invite'
    expiresAt:    params.get('expires_at'),
  };
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showInvalid(reason) {
  document.getElementById('invalid-reason').textContent = reason;
  document.getElementById('btn-retry').href = LOGIN_URL;
  showScreen('screen-invalid');
}

// ─── Boot: check token on load ────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const { accessToken, refreshToken, token, type, expiresAt } = parseHash();

  // ── Path A: JWT access_token (Supabase default links) ─────
  if (accessToken) {
    if (expiresAt && Date.now() / 1000 > parseInt(expiresAt)) {
      showInvalid('這個重設密碼連結已過期（有效期 1 小時）。請重新申請。');
      return;
    }
    const { data, error } = await sb.auth.setSession({
      access_token:  accessToken,
      refresh_token: refreshToken || '',
    });
    if (error || !data?.session) {
      showInvalid('連結驗證失敗：' + (error?.message || '未知錯誤') + '。請重新申請重設密碼。');
      return;
    }
    showScreen('screen-reset');
    document.getElementById('pw1').focus();
    return;
  }

  // ── Path B: OTP token (from {{ .Token }} in email template) ─
  if (token) {
    const tokenType = type || 'recovery';
    const { data, error } = await sb.auth.verifyOtp({
      token_hash: token,
      type:       tokenType,
    });
    if (error || !data?.session) {
      showInvalid('連結驗證失敗：' + (error?.message || '已使用或已過期') + '。請重新申請重設密碼。');
      return;
    }
    showScreen('screen-reset');
    document.getElementById('pw1').focus();
    return;
  }

  // ── No token at all ──────────────────────────────────────────
  showInvalid('URL 中找不到重設密碼的 token。請透過 Email 中的連結進入此頁面。');
});

// ─── Password strength ────────────────────────────────────────
function checkStrength() {
  const pw = document.getElementById('pw1').value;
  const len     = pw.length >= 8;
  const upper   = /[A-Z]/.test(pw);
  const num     = /[0-9]/.test(pw);
  const special = /[^A-Za-z0-9]/.test(pw);

  toggle('req-len',     len);
  toggle('req-upper',   upper);
  toggle('req-num',     num);
  toggle('req-special', special);

  const score = [len, upper, num, special].filter(Boolean).length;
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  const colors = ['#ff5f6d','#ffb347','#ffb347','#00d4aa'];
  const labels = ['太短', '弱', '中等', '良好', '強'];
  fill.style.width      = (score * 25) + '%';
  fill.style.background = colors[score - 1] || '#4a6070';
  label.textContent     = pw.length === 0 ? '請輸入密碼' : labels[score];
  label.style.color     = colors[score - 1] || 'var(--t4)';

  checkMatch();
  updateBtn();
}

function toggle(id, met) {
  document.getElementById(id).classList.toggle('met', met);
}

function checkMatch() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const el  = document.getElementById('pw2');
  if (pw2.length === 0) {
    el.classList.remove('error');
    return;
  }
  el.classList.toggle('error', pw1 !== pw2);
  updateBtn();
}

function updateBtn() {
  const pw1   = document.getElementById('pw1').value;
  const pw2   = document.getElementById('pw2').value;
  const valid = pw1.length >= 8 && pw1 === pw2;
  document.getElementById('btn-reset').disabled = !valid;
}

function toggleVis(inputId, btn) {
  const el = document.getElementById(inputId);
  const isText = el.type === 'text';
  el.type = isText ? 'password' : 'text';
  btn.style.color = isText ? 'var(--t4)' : 'var(--teal)';
}

// ─── Submit new password ──────────────────────────────────────
async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('btn-reset');

  msg.className = 'msg';
  msg.textContent = '';

  if (pw1 !== pw2) {
    showMsg('error', '兩次輸入的密碼不一致。');
    return;
  }
  if (pw1.length < 8) {
    showMsg('error', '密碼至少需要 8 個字元。');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 更新中…';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    btn.disabled = false;
    btn.textContent = '更新密碼';
    showMsg('error', '更新失敗：' + error.message);
    return;
  }

  // Sign out after reset so the user must log in fresh
  await sb.auth.signOut();

  showScreen('screen-success');
  document.getElementById('btn-go-login').href = LOGIN_URL;
  startCountdown(LOGIN_URL);
}

function showMsg(type, text) {
  const el = document.getElementById('reset-msg');
  el.className = 'msg ' + type;
  el.textContent = text;
}

// ─── Countdown redirect ───────────────────────────────────────
function startCountdown(url, seconds = 5) {
  const numEl = document.getEle
