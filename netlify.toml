# ══════════════════════════════════════════════════════════
#  Casca — Netlify Configuration
#  Domain: cascaio.com
#  Backend: casca-production.up.railway.app (Railway)
# ══════════════════════════════════════════════════════════
[build]
  publish = "."

# ── API Proxy → Railway ───────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://casca-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://casca-production.up.railway.app/health"
  status = 200
  force = true

# ── SPA Routing ───────────────────────────────────────────
[[redirects]]
  from = "/admin"
  to = "/casca-admin.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/casca-admin.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/casca-dashboard.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/terminal"
  to = "/terminal.html"
  status = 200

[[redirects]]
  from = "/annotator"
  to = "/casca-annotator.html"
  status = 200

# ── Security Headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://casca-production.up.railway.app https://api.cascaio.com https://*.supabase.co wss://*.supabase.co https://api.openai.com https://generativelanguage.googleapis.com https://api.anthropic.com; img-src 'self' data: https:; frame-ancestors 'none'"

# ── Cache Control ─────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/casca-classifier.cjs"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
